<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GripTrack — Film production inventory management for grip and electric departments." />
    <title>GripTrack</title>
    <!-- Apply saved theme before React mounts to prevent flash of wrong theme -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("gt_theme");
          if (t === "light") document.documentElement.classList.add("light");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
