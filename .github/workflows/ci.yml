name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Test
        run: npx vitest run

      - name: Build
        run: npx vite build

  mobile:
    name: Mobile (typecheck, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx jest --ci
